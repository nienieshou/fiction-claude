# 管线配置（A6 配置驱动）。阈值/模式/预算在此，不在代码。
output:
  target_chapters: 60
  chars_per_chapter: 3500          # ~21 万字
budget:
  per_book_cny_cap: 50.0           # C3 单本硬上限

# 量产结构/成本旋钮（D3）
production:
  scene_per_chapter: 1.4           # keep_scenes = 章数 × 此
  peak_divisor: 12                 # 造峰数 = 场景数 // 此（min 2）
  n_peak_bonus: 5                  # 高潮章候选 N = n_cand + 此
  wave_fallback_cuts: [8, 20, 33, 46]   # act 畸形时的固定波切口
  wave_min_chapters: 4             # 波合并下限

# 去套话门(笔力)旋钮——human-eval-5(D):現言隐婚22章重写后笔力90=机制有效,默认不松;
# 古言/修仙残留AI感属"欠检"(未来按评委标注扩 audit._CLICHE 词表),非过检。改默认须多评委数据支撑。
decliche:
  over_book_min: 8                 # 套话类全书出现≥此=疲劳类(纳入重写靶)
  per_chapter_min: 2               # 本章含≥此个疲劳套话实例→候选重写
  cap: 22                          # 最多重写章数(套话密度优先)

# 交付门阈值（人工 6+10 本校准;改动须 scripts/replay_gate.py 回放验证不退化）
# 阈值经 human-eval-5(2026-06-15)重标;真值表见 docs/evidence/human_eval5_calibration.md。
# 承重微观信号与人类承重不单调可分→降 advisory,硬门只留灾难级+定类硬伤。
ship_gate:
  too_short_chapters: 3            # 过短<70% 章数 ≥ → 拦(定类质量地板)
  dark_ratio_max: 0.25             # 暗黑饱和比 > → 拦(定类)
  seam_residual_max: 8             # 残缝 > → 拦(human-eval 未越线,保留)
  reenact_min: 7                   # 事件重演 ≥ 阈值 → 仅当 block_on_reenact 时拦
  block_on_reenact: false          # 2026-06-26 降级: reenact 噪(同书 polluted5→clean9)+非判别+误拦认证本(CPBGX00031 clean9)→默认 advisory
  spine_net_min: 6                 # Spine薄网真矛盾(数值+身份) ≥ → 拦。旧=2;human可追本含4
  block_on_climax_skip: false      # 预告跳过 硬拦?旧=是;仅命中可追本→降advisory
  block_on_final_inconsistent: false  # final_consistent=否 硬拦?旧=是;反相关→降advisory
  intra_repeat_thr: 0.08           # 章内12-gram双半重合 > → 判整章双版本
  opening_immersion_min: 40        # 开篇代入感分 < → 拦(灾难地板)。editor-eval-2:买来30→人承重40;0=关闭
  early_repeat_immersion_cap: 30   # 早段同事件重述检出>0 → 代入感封顶此值(0=关闭该联动)

# P0 清洗：网文 txt 垃圾模式（可滚动扩，maintainable）
ingest:
  encodings: [utf-8, gbk, gb18030]
  chapter_regex: '^\s*第\s*[0-9零一二三四五六七八九十百千万两]+\s*[章节卷回]'
  junk_line_patterns:                # 整行命中即删
    - '作者[的有]?话'
    - '求(订阅|月票|推荐票|打赏|收藏)'
    - '(起点中文网|晋江文学城|笔趣阁|纵横中文网|番茄小说)'
    - 'https?://|www\.'
    - '本(章|书)(未完|完)?，?(请|点击)'
    - '防盗|盗版|正版订阅'
    - '(PS|ps)[:：]'
  garbage_char: "�"            # 乱码替换符
  min_chapter_chars: 200            # 过短章 = 可疑

# 准入分级阈值（占位，M1 用 40 本标杆+金标校准）
admission:
  grades: [S, A, B, C, D, Q]
  # thresholds: 待 M1 校准

advisories:                 # C6②: 白烧 advisory 开关(不影响 gating)
  craft_audit: true         # 门后 craft 人/故事性评审(~2500tk/本, 纯报告); 量产精简可关
